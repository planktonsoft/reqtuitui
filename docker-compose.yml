services:
  app:
    stdin_open: true # Keep stdin open for interactive TUI
    tty: true        # Allocate a pseudo-TTY for the TUI
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Expose a default port (change this if your application uses a different port)
      - "8080:8080"
    volumes:
      # Mount the local source code into the container
      - .:/usr/src/app
      # Create persistent volumes for cargo registry and target directory 
      # so dependencies aren't downloaded/compiled from scratch every time
      - cargo-registry:/usr/local/cargo/registry
      - target-cache:/usr/src/app/target
    environment:
      - RUST_LOG=debug
      - RUST_BACKTRACE=1

volumes:
  cargo-registry:
  target-cache:
